<style>
:root{
  --bg:#fdf6ef;--srf:#fff;--s2:#f8fafc;--s3:#f1f5f9;
  --bd:#e8ecf2;--bd2:#cbd5e1;
  --txt:#0d1117;--mt:#64748b;--mt2:#94a3b8;
  --grn:#22c55e;--grn-l:#f0fdf4;--grn-d:#16a34a;
  --blu:#2563eb;--blu-l:#eff6ff;--blu-d:#1d4ed8;
  --red:#ef4444;--red-l:#fef2f2;
  --amb:#f59e0b;--amb-l:#fffbeb;
  --pur:#8b5cf6;--pur-l:#f5f3ff;
  --accent:#38bdf8;
  --dk-bg:#ff9b5d;
  --dk-card:rgba(255,255,255,0.88);
  --dk-border:rgba(0,0,0,0.09);
  --dk-txt:#1a120a;
  --dk-muted:rgba(80,30,0,0.65);
  --dk-dim:rgba(80,30,0,0.50);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.04);
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--mt2); }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Plus Jakarta Sans,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
input,button,textarea{font-family:inherit}

@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes slideUpSheet{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

#app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
.hdr{position:sticky;top:0;background:var(--dk-bg);border-bottom:1px solid var(--dk-border);z-index:100;box-shadow:0 2px 16px rgba(180,70,0,.20)}
.htop{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 0;position:relative}
.htop::after{content:'';position:absolute;top:0;left:0;right:0;height:80px;background:radial-gradient(ellipse at 50% 0%,rgba(56,189,248,.12) 0%,transparent 70%);pointer-events:none}
.atitle{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-muted)}
.htop-r{display:flex;align-items:center;gap:8px}
.bdg{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px}
.cfg-btn{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:7px;padding:4px 9px;cursor:pointer;font-size:12px;color:var(--dk-muted);transition:background 0.2s;display:flex;align-items:center;gap:4px}
.cfg-btn:hover{background:rgba(255,255,255,.1)}
.mnav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.mb{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--dk-muted);transition:all 0.2s}
.mb:hover{background:rgba(0,0,0,.08);color:var(--dk-txt)}
.mlbl{font-size:17px;font-weight:800;letter-spacing:-0.03em;color:var(--dk-txt)}

.tetos{
  display:flex;
  gap:10px;
  padding:0 16px 10px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.tetos::-webkit-scrollbar{display:none}
.tc{
  flex:0 0 200px;
  max-width:220px;
  max-height:80px;
  overflow:hidden;
  scroll-snap-align:start;
  background:var(--dk-card);
  border:1px solid var(--dk-border);
  border-radius:12px;
  padding:8px 13px 7px;
  transition:transform 0.15s;
  box-shadow:0 2px 10px rgba(120,60,0,0.12);
}
.tc:active{transform:scale(0.97);}
.tclbl{font-size:9px;font-weight:500;color:rgba(30,18,8,0.58);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tcrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.tcsp{font-family:\'DM Mono\',monospace;font-size:13px;font-weight:300}
.tclim{font-family:\'DM Mono\',monospace;font-size:10px;color:var(--dk-dim)}
.tbar{height:4px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden}
.tfill{height:100%;border-radius:99px;transition:width .4s ease}
.trest{font-size:10px;font-family:\'DM Mono\',monospace;margin-top:3px;text-align:right}


@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ct{padding:16px 16px 90px;flex:1;width:100%;min-width:0;animation:fadeIn 0.18s ease-out}


.card{background:var(--srf);border:none;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);min-width:0;max-width:100%}

.sec-line{flex:1;height:1px;background:var(--bd);margin-left:8px}

/* Goal bars */
.goal-card{background:var(--srf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.goal-bar-bg{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-top:8px}
.goal-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}

/* Due day badge */
.due-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:6px;background:#fef3c7;color:#92400e;display:inline-flex;align-items:center;gap:3px}
.due-badge.urgent{background:#fee2e2;color:#991b1b}
.due-badge.ok{background:#f0fdf4;color:#166534}

/* Section header with action button */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.sec-hdr-lbl{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.sec-hdr-btn{font-size:12px;font-weight:600;color:var(--blu);background:none;border:none;cursor:pointer;padding:0}

.tab-ico{display:block;font-size:14px;margin-bottom:2px}

.btn-export{background:var(--s2);color:var(--txt);border:1px solid var(--bd);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background 0.2s}
.btn-export:hover{background:var(--bd)}

.bill-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.bill-row:last-child{border-bottom:none}
.bill-name{font-size:13px;font-weight:500}
.bill-day{font-family:monospace;font-size:12px;font-weight:700}
.bill-amt{font-family:monospace;font-size:13px;font-weight:700}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--srf);border:none;border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);transition:box-shadow 0.2s}
.sc:hover{box-shadow:var(--shadow-md)}
.sl{font-size:11px;font-weight:600;color:var(--mt);margin-bottom:6px}
.sv{font-family:\'DM Mono\',monospace;font-size:18px;font-weight:400;letter-spacing:-0.02em}
.ss{font-size:11px;color:var(--mt2);margin-top:4px}

.cards-grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 12px; align-items: start; width: 100%; }
.dash-cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 24px; }

.gr{display:flex;align-items:flex-start;padding:12px 10px;border-bottom:1px solid var(--bd);margin:0 -10px;border-radius:8px;transition:background 0.2s}
.gr.clickable{cursor:pointer}
.gr.clickable:hover{background:var(--s2)}
.gr:last-child{border-bottom:none}
.grl{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
.gri{flex:1;min-width:0}
.grn{font-size:13px;font-weight:600;color:var(--txt)}
.grc{font-size:11px;color:var(--mt);margin-top:2px}
.grr{text-align:right;flex-shrink:0}

function _storageKeyForUser(uid){ return uid ? KEY + ':' + uid : null; }
function _readUserLocalData(uid){
  var key = _storageKeyForUser(uid);
  if(!key) return null;
  try {
    var raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function _cacheUserLocalData(data, uid){
  var key = _storageKeyForUser(uid);
  if(!key || !data) return;
  try {
    var serialized = JSON.stringify(data);
    if(serialized.length < 2 * 1024 * 1024) localStorage.setItem(key, serialized);
  } catch(e) {}
}
function _clearLocalSessionData(uid){
  // Remove a chave sem uid (legada, versões antigas) e a chave com uid (atual)
  try { localStorage.removeItem(KEY); } catch(e) {}
  var key = _storageKeyForUser(uid);
  if(key) { try { localStorage.removeItem(key); } catch(e) {} }
}

function normalizeDataText(){

  if(D && !D.config){ D.config = JSON.parse(JSON.stringify(INIT.config)); changed = true; }
  if(D && D.config){
    ['categoryLabels','categoryColors','categoryKeywords'].forEach(function(k){ if(!D.config[k]){D.config[k]={}; changed=true;} });

    D.investments = [];

  }
  if(D && D.config && Array.isArray(D.config.salaries)){

function startUserDataListener(user){
  pendingEmailVerification = false;
  var activeUid = user.uid;
  userId = activeUid;
  isCloud = true;
  stopUserDataListener();
  // Inicia busca das taxas do Banco Central em segundo plano assim que o usuário loga
  if(typeof fetchBacenRates === 'function') fetchBacenRates().then(function(r){ _bacenRates = r; });
  unsubscribeSnapshot = onSnapshot(
    doc(db, "users", activeUid),
    { includeMetadataChanges: true },
    (docSnap) => {
      if(activeUid !== userId) return;
      // Detecta se os dados vêm do cache local (offline) ou do servidor
      _fromCache = docSnap.metadata.fromCache;
      _hasPendingWrites = docSnap.metadata.hasPendingWrites;
      if (docSnap.exists()) {
        pendingGoogleNoData = false;
        clearGoogleIntent();
        var incoming = (docSnap.data() || {}).data || JSON.parse(JSON.stringify(INIT));
        // Se veio do servidor (não cache), atualiza. Se cache e D já existe, mantém D.
        if (!_fromCache || !D) {
          D = incoming;
          if(normalizeDataText()) { setDoc(doc(db, "users", activeUid), { data: D }).catch(function(){}); } // fire-and-forget: normaliza dados legados
          _cacheUserLocalData(D, activeUid);
        }
        // Evita destruir formulários/modais em edição quando o Firestore sincroniza em segundo plano.
        if(shouldDeferSnapshotRender()) return;
        render();
      } else {
        var googleIntent = getGoogleIntent();
        var signedWithGoogle = userHasProvider(user, 'google.com');
        if (signedWithGoogle && googleIntent !== 'signup') {
          pendingGoogleNoData = true;
          userId = null;
          isCloud = false;
          D = null;
          stopUserDataListener();
          render();
          return;
        }

        pendingGoogleNoData = false;
        clearGoogleIntent();
        D = _readUserLocalData(activeUid) || JSON.parse(JSON.stringify(INIT));
        _cacheUserLocalData(D, activeUid);
        setDoc(doc(db, "users", activeUid), { data: D }).catch(function(){}); // fire-and-forget: criação de novo usuário
        render();
        // Novo usuário: mostra onboarding
        if (!D.onboarded) {
          setTimeout(function(){ window.openOnboarding && window.openOnboarding(); }, 400);
        }
      }
    }, function(err){
      if(activeUid !== userId) return;
      // Falhou ao escutar (sem cache, offline) — carrega somente o fallback isolado do usuário atual
      console.warn('onSnapshot error, usando localStorage isolado:', err.code||err);
      var localData = _readUserLocalData(activeUid);
      if(localData){ D = localData; render(); }
    }
  );
}

});

function googleErrMsg(err, context){
  if (err && err.code === 'auth/account-exists-with-different-credential') {
    return 'Já existe uma conta com este e-mail usando outro método de acesso. Entre com e-mail e senha e conecte o Google em Ajustes > Conta para manter seus dados atuais.';
  }
  if (err && err.code === 'auth/credential-already-in-use') {
    return 'Esta conta Google já está ligada a outro usuário do Firebase. Isso pode acontecer quando alguém tentou “Entrar com Google” antes de vincular. Para proteger seus dados, a conexão foi bloqueada. Apague no Firebase Authentication o usuário duplicado do Google que não tem dados financeiros, ou faça uma migração manual antes de tentar novamente.';
  }
  if (err && err.code === 'auth/provider-already-linked') {
    return 'O Google já está conectado a esta conta.';
  }
  if (err && err.code === 'auth/operation-not-allowed') {
    return 'O provedor Google ainda não está habilitado no Firebase Authentication.';
  }
  if (err && err.code === 'auth/unauthorized-domain') {
    return 'Este domínio não está autorizado no Firebase Authentication. Adicione o domínio atual em Authentication > Settings > Authorized domains.';
  }
  if (err && (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request')) {
    return 'A janela do Google foi fechada antes de concluir. Tente novamente e aguarde a seleção da conta terminar.';
  }
  if (err && err.code === 'auth/popup-blocked') {
    return 'O navegador bloqueou a janela do Google. Permita pop-ups para este site e tente novamente.';
  }
  return (context || 'Não foi possível concluir a ação com Google') + ': ' + ((err && err.message) || 'erro desconhecido');
}

async function handleGoogleRedirectResult(){
  var intent = getGoogleIntent();

      U.secMsg = {ok:true, txt:'Google conectado com sucesso. A partir de agora, você pode entrar usando e-mail/senha ou Google.'};
      clearGoogleIntent();
      if(authChecked) render();
      return;
    }
    if(result){
      clearGoogleIntent();
      return;
    }
  } catch(err) {
    if(intent === 'link'){
      U.tab = 'config';
      U.scr = 'main';
      U.configSection = 'conta';
      U.secMsg = {ok:false, txt:googleErrMsg(err, 'Não foi possível conectar o Google')};
      clearGoogleIntent();
      if(authChecked) render();
      return;
    }
    setAuthFlash(googleErrMsg(err, 'Erro ao entrar com Google'), false);

}

function dueDaysFromNow(dueDay, m) {
  if(!dueDay) return null;
  var today = new Date();
  var yr = today.getFullYear(), mo = today.getMonth();
  var due = new Date(yr, mo, dueDay);
  if(due < today) due = new Date(yr, mo+1, dueDay);
  return Math.round((due - today)/(1000*60*60*24));
}
function dueBadge(dueDay, m) {
  if(!dueDay) return '';
  var d = dueDaysFromNow(dueDay, m);
  if(d === null) return '';
  var cls = d <= 3 ? 'urgent' : d <= 7 ? 'due-badge' : 'ok';
  var lbl = d === 0 ? 'Vence hoje' : d < 0 ? 'Venceu' : 'Dia '+dueDay;
  return '<span class="due-badge '+cls+'">&#128197; '+lbl+'</span>';
}

// isEst: undefined or true = estimativa, false = invariável
function isEst(item){ return item.isEstimate !== false; }

function stats(m){
  var baseSal = totSal();
  var extraInc = ((D.extraIncome && D.extraIncome[m]) || []).reduce(function(s,e){return s+e.amount;},0);
  var sal = baseSal + extraInc;
  var totalManual = 0;
  var totalCommitted = 0;
  var totalReal = 0;
  var invTotalR = 0;
  var cats = {};

  var plannedAll = getPlanned(m);
  var expsAll = getExp(m);

  GR.forEach(function(g) {
    var planned = plannedAll.filter(function(i){ return i.group === g.id; });

    var pInv = planned.filter(function(i){ return i.isFixed && !isEst(i); })
                      .reduce(function(s,i){return s+i.amount;},0);
    var pEst = planned.filter(function(i){ return !i.isFixed || isEst(i); })
                      .reduce(function(s,i){return s+i.amount;},0);

    if(pInv === 0 && pEst === 0 && D.config.tetos[g.id]) pEst = D.config.tetos[g.id];

    var s = expsAll.filter(function(e){return e.group===g.id;}).reduce(function(acc,e){return acc+e.amount;},0);

    var cCommitted = pInv + Math.max(pEst, s);
    var cReal = pInv + s;

    totalManual    += s;
    totalCommitted += cCommitted;
    totalReal      += cReal;
    invTotalR      += pInv;

    cats[g.id] = { p: pInv+pEst, pInv: pInv, pEst: pEst, s: s, c: cCommitted, real: cReal };
  });

  var expTotal   = expsAll.reduce(function(s,e){return s+e.amount;},0);
  var abated     = (D.instAbatimentos && D.instAbatimentos[m]) || [];
  var activeInst = getActiveInst(m);
  var parcTotalR = activeInst.filter(function(i){return abated.indexOf(i.id)===-1;}).reduce(function(s,i){return s+i.amount;},0);
  var gastoReal  = expTotal + invTotalR + parcTotalR;

  return {
    sal: sal,
    baseSal: baseSal,
    extraInc: extraInc,
    sp: totalManual,
    committed: totalCommitted,
    realSpent: totalReal,
    gastoReal: gastoReal,
    expTotal: expTotal,
    invTotal: invTotalR,
    parcTotal: parcTotalR,
    realSav: sal - totalReal,
    projSav: sal - totalCommitted,
    cats: cats
  };
}

/* =========================================================
   MOTOR DE EXTRAÇÃO LÉXICA (NLP) - SEPARA DATA, VALOR E DESCRIÇÃO
   ========================================================= */
function parseQEtxt(txt){
  if(!txt.trim()) return null;
  let original = txt;
  let dateObj = new Date();
  let dateStr = tod();
  let displayDate = 'Hoje';

  // Extrai marcadores de tempo
  const dateRegex = /\b(hoje|ontem|antes\s+de\s+ontem|anteontem|dia\s+([0-3]?\d)|([0-3]?\d)\/([0-1]?\d)(?:\/\d{2,4})?)\b/i;
  const dateMatch = original.match(dateRegex);

  if (dateMatch) {
    let m = dateMatch[0].toLowerCase();
    if (m === 'ontem') {
      dateObj.setDate(dateObj.getDate() - 1); displayDate = 'Ontem';
    } else if (m === 'anteontem' || m === 'antes de ontem') {
      dateObj.setDate(dateObj.getDate() - 2); displayDate = 'Anteontem';
    } else if (m.startsWith('dia ')) {
      let d = parseInt(m.replace(/\D/g, ''), 10);
      if (d >= 1 && d <= 31) dateObj.setDate(d);
      displayDate = `Dia ${String(d).padStart(2,'0')}`;
    } else if (dateMatch[3] && dateMatch[4]) {
      let d = parseInt(dateMatch[3], 10); let mo = parseInt(dateMatch[4], 10) - 1;
      // Usa o construtor para evitar overflow ao mutar dia/mês separadamente (bug do dia 31)
      dateObj = new Date(dateObj.getFullYear(), mo, d);
      displayDate = `${String(d).padStart(2,'0')}/${String(mo+1).padStart(2,'0')}`;
    }
    dateStr = dateObj.getFullYear() + '-' + String(dateObj.getMonth()+1).padStart(2,'0') + '-' + String(dateObj.getDate()).padStart(2,'0');
    original = original.replace(dateMatch[0], ' ');
  }

  // Extrai o valor monetário
  let amount = 0;
  const amtRegex = /(?:r\$\s*)?(\d{1,3}(?:\.\d{3})*(?:,\d{1,2})?|\d+(?:[.,]\d{1,2})?)/i;
  const amtMatch = original.match(amtRegex);

  if (amtMatch) {
    let amtStr = amtMatch[1].replace(/\./g, '').replace(',', '.');
    amount = parseFloat(amtStr);
    original = original.replace(amtMatch[0], ' ');
  } else {
    return null;
  }

  if(!amount || isNaN(amount)) return null;

  // Categoria automática baseada no restante do texto
  let group = 'outros';
  let low = original.toLowerCase();
  let lowNorm = low.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  let bestScore = 0;
  let kwMap = categoryKeywordsMap();
  let keys = Object.keys(kwMap);
  function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  for(let i=0; i<keys.length; i++){
    let cat = keys[i];
    let words = kwMap[cat] || [];
    for(let j=0; j<words.length; j++){
      let raw = String(words[j] || '').toLowerCase();
      let kw = raw.normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
      if(!kw) continue;
      let matched = false;
      if(kw.indexOf(' ') >= 0) matched = lowNorm.indexOf(kw) >= 0;
      else matched = new RegExp('(^|[^a-z0-9])'+escRe(kw)+'([^a-z0-9]|$)', 'i').test(lowNorm);
      if(matched){
        let score = kw.length + (kw.indexOf(' ') >= 0 ? 8 : 0);
        if(score > bestScore){ bestScore = score; group = cat; }
      }
    }
  }

  let desc = original.replace(/\s+/g, ' ').trim();
  if(!desc) desc = gBy(group).label;
  else desc = desc.charAt(0).toUpperCase() + desc.slice(1);

  var det = (typeof detectBankAndPayment === 'function') ? detectBankAndPayment(txt) : {bank:'', payment:''};
  return { amount: amount, group: group, description: desc, date: dateStr, displayDate: displayDate, sourceBank: det.bank || '', paymentType: det.payment || '' };
}

  if(pendingEmailVerification) { app.innerHTML = rVerifyEmail(); return; }
  if(!userId) { app.innerHTML = rLogin(); document.documentElement.classList.add('login-bg'); return; }
  document.documentElement.classList.remove('login-bg');
  ensureCategoryConfig();
  refreshGroups();

  // Telas que abrem como modal flutuante por cima do conteúdo atual
  if(MODAL_SCRS[U.scr]){
    var existingOverlay = document.getElementById('form-modal-overlay');
    if(!existingOverlay){
      // Primeira abertura: renderiza a tela principal por baixo
      app.innerHTML = rMain();
      existingOverlay = document.createElement('div');
      existingOverlay.id = 'form-modal-overlay';
      existingOverlay.className = 'form-overlay';
      existingOverlay.addEventListener('click', function(e){
        if(e.target === existingOverlay) window.goMain();
      });
      document.body.appendChild(existingOverlay);
    }
    var modalTitles = {add:'Lançar gasto', addPlan:'Conta prevista', addInst:'Nova parcela', investForm:(U.investEd?'Editar investimento':'Novo investimento')};
    var formHtml = U.scr==='add' ? rAddForm() : U.scr==='addPlan' ? rAddPlanForm() : U.scr==='addInst' ? rAddInstForm() : rInvestForm();
    existingOverlay.innerHTML =
      '<div class="form-modal">' +
        '<div class="form-modal-topbar">' +
          '<span class="form-modal-title">' + modalTitles[U.scr] + '</span>' +
          '<button class="cat-modal-close" onclick="window.goMain()" title="Fechar">&#10005;</button>' +
        '</div>' +
        formHtml +
      '</div>';
    return;
  }

  // Remove modal de formulário se existir (ex: após salvar ou cancelar)
  var existingModal = document.getElementById('form-modal-overlay');
  if(existingModal) existingModal.remove();

  if(U.scr==='main')app.innerHTML=rMain();
  else if(U.scr==='edit')app.innerHTML=rEditForm();
  else if(U.scr==='planEdit')app.innerHTML=rPlanEdit();
  else if(U.scr==='instEdit')app.innerHTML=rInstEdit();
  else if(U.scr==='addExtraIncome')app.innerHTML=rAddExtraIncomeForm();
  else if(U.scr==='import')app.innerHTML=rImport();
  else if(U.scr==='calendar')app.innerHTML=rCalendar();
  else if(U.scr==='gastosMes')app.innerHTML=rGastosMes();
  else if(U.scr==='goals')app.innerHTML=rGoals();
}

function rHdr(){
  var m=U.month;var st=stats(m);var tgt=D.config.targetSavings;
  var gl=st.sal-tgt;
  var gp=Math.min(100,gl>0?(st.committed/gl)*100:0);
  var go=st.committed>gl;
  var pM = st.cats['mercado'].p; var sM = st.cats['mercado'].s;
  var mp=Math.min(100, pM>0?(sM/pM)*100:0); var mo=sM>pM;
  var pL = st.cats['lanches'].p; var sL = st.cats['lanches'].s;
  var lp=Math.min(100, pL>0?(sL/pL)*100:0); var lo=sL>pL;

  // Cards de atalho configuráveis (undefined = legado → mantém mercado+lanches)
  var hCardIds = (D.config.headerCards === undefined || D.config.headerCards === null)
    ? ['mercado','lanches'] : D.config.headerCards;
  function tc(lbl, val1, val2, pct, over, txtResta){
    return'<div class="tc"><div class="tclbl">'+lbl+'</div><div class="tcrow"><span class="tcsp" style="color:'+bclr(pct,over)+'">'+R(val1)+'</span></div><div class="tbar"><div class="tfill" style="width:'+pct+'%;background:'+bclr(pct,over)+'"></div></div></div>';
  }


  var extraCards = hCardIds.length > 0
    ? hCardIds.map(function(catId){
        var c = st.cats[catId] || {p:0,s:0};
        var g2 = gBy(catId);
        var pC=c.p; var sC=c.s;
        var pct2=Math.min(100,pC>0?(sC/pC)*100:0); var ov2=sC>pC&&pC>0;
        return tc(g2.label,sC,pC,pct2,ov2,ov2?'+ '+R(sC-pC):'Resta '+R(pC-sC));
      }).join('')
    : '<div class="tc" style="cursor:pointer;border:1px dashed rgba(255,255,255,0.22);background:rgba(255,255,255,0.03);min-width:160px" onclick="window.openConfigModal()" title="Personalizar atalhos">'

      +'</div>';

  var sobraCard = '<div class="tc" style="cursor:default"><div class="tclbl">Dinheiro sobrando</div>'
    +'<div class="tcrow"><span class="tcsp" style="color:'+(sobra>=0?'var(--grn)':'var(--red)')+'">'+R(sobra)+'</span></div>'

function rDash(){

  var gastoPct = st.sal>0 ? Math.round((st.gastoReal/st.sal)*100) : 0;

  var sobraPct = st.sal>0 ? Math.round((sobraReal/st.sal)*100) : 0;
  var cards='<div class="dash-cards">'
    +'<div class="sc" style="cursor:pointer;border-top:3px solid var(--grn)" onclick="window.openConfigModal(\'usabilidade\')" title="Editar renda">'

      +'<div class="sl">🛒 Gastei este mês</div>'

      +'<div class="ss">'+gastoPct+'% da receita · toque para ver</div>'

    +'<div class="sc" style="border-top:3px solid '+(sobraReal>=0?'var(--grn)':'var(--red)')+'">'

// ── BACEN: taxas de referência (CDI / Selic / IPCA) ──────────────────────
var _bacenRates = null; // {cdi, selic, ipca, fetchedAt, estimated}

async function fetchBacenRates(){
  if(_bacenRates && (Date.now()-_bacenRates.fetchedAt) < 12*3600*1000) return _bacenRates;
  try {
    // Timeout de 3 segundos: evita que a aba de Investimentos trave esperando a API do BCB
    var ctrl = new AbortController();
    var timeoutId = setTimeout(function(){ ctrl.abort(); }, 3000);
    var fetchJSON = function(url){ return fetch(url, {signal: ctrl.signal}).then(function(r){return r.json();}); };
    var [rCdi, rSelic, rIpca] = await Promise.all([
      fetchJSON('https://api.bcb.gov.br/dados/serie/bcdata.sgs.4389/dados/ultimos/1?formato=json'),
      fetchJSON('https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados/ultimos/1?formato=json'),
      fetchJSON('https://api.bcb.gov.br/dados/serie/bcdata.sgs.13522/dados/ultimos/1?formato=json'),
    ]);
    clearTimeout(timeoutId);
    _bacenRates = {
      cdi:   parseFloat(String((rCdi[0]||{}).valor||'').replace(',','.')||'10.5'),
      selic: parseFloat(String((rSelic[0]||{}).valor||'').replace(',','.')||'10.5'),
      ipca:  parseFloat(String((rIpca[0]||{}).valor||'').replace(',','.')||'4.5'),
      fetchedAt: Date.now(),
      estimated: false,
    };
  } catch(e){
    _bacenRates = _bacenRates || {cdi:10.5, selic:10.5, ipca:4.5, fetchedAt:Date.now(), estimated:true};
  }
  return _bacenRates;
}

// Retorna hint de taxa com base nas taxas BACEN e no tipo de rendimento
function invRateHint(inv){
  var rates = _bacenRates;
  if(!rates) return '';
  var ym = inv.yieldMode||'manual';
  if(ym==='none') return '';
  var rate = Number(inv.rate||0);
  if(!rate) return '';
  var period = inv.ratePeriod||'year';
  var annualRate = period==='month' ? ((Math.pow(1+rate/100,12)-1)*100) : rate;
  var type = inv.type||'renda_fixa';
  var hints = [];
  if(type==='renda_fixa'){
    var cdiEq = rates.cdi > 0 ? (annualRate/rates.cdi*100).toFixed(0) : null;
    if(cdiEq) hints.push(cdiEq+'% do CDI ('+rates.cdi.toFixed(2)+'% a.a.)');
  }
  var monthlyPct = ((Math.pow(1+annualRate/100,1/12)-1)*100).toFixed(3);
  hints.push(monthlyPct+'% a.m. efetivo');
  return hints.join(' · ');
}

];
const INVEST_LIQ = [

  {id:'vencimento', label:'No vencimento'},
  {id:'bloqueada',  label:'Bloqueada'},
  {id:'manual',     label:'Manual'},
];

// Retorna o tipo enriched ou fallback
function invType(id){
  return INVEST_TYPES.find(function(t){return t.id===id;}) || {id:'outro',label:'Outro',rateMode:'fixed',icon:'📦',color:'#94a3b8'};
}
function invTypeLabel(id){ return invType(id).label; }
function invLiqLabel(id){
  var x=INVEST_LIQ.find(function(t){return t.id===id;});
  return x?x.label:'Manual';
}
function monthDiffFromStart(startDate, refMonth){
  if(!startDate) return 0;
  var p=String(startDate).split('-').map(Number);
  if(!p[0]||!p[1]) return 0;
  var r=String(refMonth||mM()).split('-').map(Number);
  var months=(r[0]-p[0])*12+(r[1]-p[1]);
  return Math.max(0, months);
}

// Taxa mensal base (sem BACEN) — compatibilidade com dados antigos
function invMonthlyRate(inv){
  if(!inv || inv.yieldMode==='none') return 0;
  var rate = Number(inv.rate||0);
  if(!rate || isNaN(rate)) return 0;
  var r = rate/100;
  return inv.ratePeriod === 'month' ? r : Math.pow(1+r,1/12)-1;
}

// Taxa mensal BACEN-aware — usa dados do Banco Central quando disponíveis
function liveMonthlyRate(inv){
  if(!inv) return 0;
  var t = invType(inv.type);
  var rates = _bacenRates || {cdi:10.5, selic:10.5, ipca:4.5};
  var annualPct = 0;
  if(t.rateMode === 'cdi'){
    var cdiPct = Number(inv.cdiPct || inv.rate || 100);
    annualPct = (cdiPct / 100) * rates.cdi;
  } else if(t.rateMode === 'selic'){
    annualPct = rates.selic;
  } else if(t.rateMode === 'ipca'){
    annualPct = rates.ipca + Number(inv.spread || inv.rate || 0);
  } else if(t.rateMode === 'poup'){
    annualPct = rates.selic > 8.5 ? 0.7 * rates.selic : 6.17;
  } else if(t.rateMode === 'manual'){
    if(inv.yieldMode === 'none' || !Number(inv.rate)) return 0;
    annualPct = inv.ratePeriod === 'month'
      ? (Math.pow(1+Number(inv.rate)/100, 12)-1)*100
      : Number(inv.rate||0);
  } else { // fixed
    if(inv.yieldMode === 'none') return 0;
    annualPct = inv.ratePeriod === 'month'
      ? (Math.pow(1+Number(inv.rate)/100, 12)-1)*100
      : Number(inv.rate||0);
  }
  if(!annualPct) return 0;
  return Math.pow(1 + annualPct/100, 1/12) - 1;
}

function invMonthlyYield(inv){
  var amount = Number(inv&&inv.amount||0);
  return amount * liveMonthlyRate(inv);
}
function invProjectionValue(inv, months){
  var amount = Number(inv&&inv.amount||0);
  var mr = liveMonthlyRate(inv);
  if(!amount || !mr) return amount;
  return amount * Math.pow(1+mr, months||0);
}
function investmentSummary(refMonth){
  var list = Array.isArray(D&&D.investments) ? D.investments : [];
  var total=0, monthly=0, accumulated=0, projected12=0;
  list.forEach(function(inv){
    var amount=Number(inv.amount||0);
    total += amount;
    var mr = liveMonthlyRate(inv);
    monthly += amount*mr;
    var months=monthDiffFromStart(inv.startDate, refMonth||U.month);
    accumulated += mr ? amount*(Math.pow(1+mr, months)-1) : 0;
    projected12 += invProjectionValue(inv, 12);
  });
  return {list:list,total:total,monthly:monthly,accumulated:accumulated,projected12:projected12,count:list.length};
}

function rInvestForm(){
  var id=U.investEd;
  var inv=(D.investments||[]).find(function(x){return x.id===id;})||{};
  var name=safeAttr(inv.name||'');
  var amount=Number(inv.amount||0)||'';
  var startDate=safeAttr(inv.startDate||tod());
  var dueDate=safeAttr(inv.dueDate||'');
  var notes=safeAttr(inv.notes||'');
  var type=INVEST_TYPES.some(function(ti){return ti.id===inv.type;}) ? inv.type : 'cdb_cdi';
  var liquidity=INVEST_LIQ.some(function(li){return li.id===inv.liquidity;}) ? inv.liquidity : 'diaria';
  var rates=_bacenRates;
  var t=invType(type);

  // Valores específicos por modo
  var cdiPct=Number(inv.cdiPct||inv.rate||100);
  var spread=Number(inv.spread||inv.rate||0);
  var fixedRate=Number(inv.rate||0);
  var ratePeriod=inv.ratePeriod==='month'?'month':'year';
  var yieldMode=inv.yieldMode==='none'?'none':'manual';

  // Monta seção de taxa conforme tipo
  function rateSection(tp){
    var tt=invType(tp);
    var rm=tt.rateMode;
    var bacenLine=rates?'CDI: '+rates.cdi.toFixed(2)+'% · Selic: '+rates.selic.toFixed(2)+'% · IPCA: '+rates.ipca.toFixed(2)+'%':'Buscando taxas BACEN...';
    if(rm==='cdi'){
      var eff=rates?((cdiPct/100)*rates.cdi).toFixed(2)+'% a.a. efetivo':'—';
      return'<div style="margin-bottom:16px">'
        +'<label class="fl">% do CDI</label>'
        +'<div style="display:flex;gap:8px;align-items:center">'
          +'<input class="fi" id="inv-cdipct" type="number" value="'+cdiPct+'" placeholder="ex: 110" style="flex:1;font-family:\'DM Mono\',monospace;font-size:18px;font-weight:700" min="0" step="0.1">'
          +'<span style="font-size:14px;font-weight:700;color:var(--mt);white-space:nowrap">% do CDI</span>'
        +'</div>'
        +'<div style="font-size:11px;background:var(--grn-l);color:var(--grn-d);border-radius:8px;padding:6px 10px;margin-top:6px;font-weight:600">≈ '+eff+' · '+bacenLine+'</div>'
      +'</div>';
    } else if(rm==='selic'||rm==='poup'){
      var selicEff=rates?(rm==='selic'?rates.selic.toFixed(2):(rates.selic>8.5?(0.7*rates.selic).toFixed(2):6.17.toFixed(2)))+'% a.a. estimado':'calculado automaticamente';
      return'<div style="background:var(--grn-l);border:1px solid #bbf7d0;border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px">'
        +'<span style="font-size:20px">'+(rm==='selic'?'🏛️':'🐷')+'</span>'
        +'<div><div style="font-size:13px;font-weight:700;color:var(--grn-d)">Rentabilidade automática pelo BACEN</div>'
        +'<div style="font-size:11px;color:var(--mt);margin-top:2px">'+selicEff+(rates?' · '+bacenLine:'')+'</div></div>'
      +'</div>';
    } else if(rm==='ipca'){
      var effIpca=rates?(rates.ipca+spread).toFixed(2)+'% a.a. estimado':'IPCA + spread';
      return'<div style="margin-bottom:16px">'
        +'<label class="fl">Taxa fixa acima do IPCA (% a.a.)</label>'
        +'<div style="display:flex;gap:8px;align-items:center">'

function rPlanos(){
  var goals = D.goals||[];
  var goalTypes = {
    viagem:{ico:'✈️',label:'Viagem'},carro:{ico:'🚗',label:'Carro'},
    casa:{ico:'🏠',label:'Casa'},reserva:{ico:'🛡️',label:'Reserva'},
    compra:{ico:'🛍️',label:'Compra'},outro:{ico:'🎯',label:'Objetivo'}
  };

  var totalSaved = goals.reduce(function(s,g){return s+g.saved;},0);
  var totalLeft  = goals.reduce(function(s,g){return s+Math.max(0,g.target-g.saved);},0);

  // Summary bar
  var summary = goals.length
    ? '<div class="dash-cards" style="margin-bottom:20px">'
      +'<div class="sc" style="border-top:3px solid var(--grn)"><div class="sl">Total guardado</div><div class="sv" style="color:var(--grn)">'+R(totalSaved)+'</div><div class="ss">em '+goals.length+' plano'+(goals.length===1?'':'s')+'</div></div>'
      +'<div class="sc" style="border-top:3px solid var(--amb)"><div class="sl">Total restante</div><div class="sv" style="color:var(--txt)">'+R(totalLeft)+'</div><div class="ss">para atingir as metas</div></div>'
    +'</div>'
    : '';

  // Plan cards grid
  var cards = goals.length ? '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px">'
    + goals.map(function(g){
        var pct = g.target>0 ? Math.min(100,Math.round((g.saved/g.target)*100)) : 0;
        var left = Math.max(0, g.target - g.saved);
        var gc = g.color||'var(--blu)';
        var tp = goalTypes[g.type] || goalTypes.outro;
        var monthly = g.monthly||0;
        var monthsLeft = (monthly>0 && left>0) ? Math.ceil(left/monthly) : null;
        var deadline = g.deadline||null;
        var monthsToDeadline = null;
        if(deadline){
          var now2=new Date(); var dl2=new Date(deadline+'-01');
          monthsToDeadline=Math.max(0,(dl2.getFullYear()-now2.getFullYear())*12+(dl2.getMonth()-now2.getMonth()));
        }
        var neededMonthly = (monthsToDeadline&&monthsToDeadline>0) ? Math.ceil(left/monthsToDeadline) : null;

        // Ring
        var rr=28, rcirc=2*Math.PI*rr, rfill=(pct/100)*rcirc;
        var ring = '<svg width="68" height="68" viewBox="0 0 68 68" style="flex-shrink:0">'
          +'<circle cx="34" cy="34" r="'+rr+'" fill="none" stroke="var(--bd)" stroke-width="9"/>'
          +'<circle cx="34" cy="34" r="'+rr+'" fill="none" stroke="'+gc+'" stroke-width="9"'
          +' stroke-dasharray="'+rfill.toFixed(1)+' '+(rcirc-rfill).toFixed(1)+'"'
          +' stroke-dashoffset="'+(rcirc/4).toFixed(1)+'" transform="rotate(-90 34 34)" stroke-linecap="round"/>'
          +'<text x="34" y="38" text-anchor="middle" font-size="13" font-weight="900" fill="'+gc+'" font-family="DM Mono,monospace">'+pct+'%</text>'

        if(monthsLeft) simChip = '<div style="font-size:11px;color:var(--blu-d);background:var(--blu-l);border-radius:20px;padding:3px 10px;display:inline-flex;align-items:center;gap:4px;margin-top:8px">📅 ~'+monthsLeft+' mês'+(monthsLeft===1?'':'es')+' com R$'+Math.round(monthly).toLocaleString('pt-BR')+'/mês</div>';
        else if(neededMonthly) simChip = '<div style="font-size:11px;color:var(--grn-d);background:var(--grn-l);border-radius:20px;padding:3px 10px;display:inline-flex;align-items:center;gap:4px;margin-top:8px">🎯 R$'+Math.round(neededMonthly).toLocaleString('pt-BR')+'/mês até prazo</div>';
        else simChip = '<div style="font-size:11px;color:var(--mt);margin-top:8px">Faltam '+R(left)+'</div>';

          +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">'
            +ring
            +'<div style="flex:1;min-width:0">'
              +'<div style="font-size:11px;color:var(--mt);margin-bottom:2px">'+tp.ico+' '+tp.label+'</div>'
              +'<div style="font-size:16px;font-weight:800;color:var(--txt);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+safeTxt(g.label)+'</div>'
              +'<div style="display:flex;gap:6px;align-items:baseline;margin-top:3px">'
                +'<span style="font-family:DM Mono,monospace;font-size:15px;font-weight:700;color:'+gc+'">'+R(g.saved)+'</span>'
                +'<span style="font-family:DM Mono,monospace;font-size:11px;color:var(--mt2)">/ '+R(g.target)+'</span>'
              +'</div>'
            +'</div>'
          +'</div>'
          +'<div style="height:6px;background:var(--bd);border-radius:99px;overflow:hidden;margin-bottom:6px">'
            +'<div style="width:'+pct+'%;height:100%;background:'+gc+';border-radius:99px;transition:width .5s"></div>'
          +'</div>'
          +simChip
          +'<div style="display:flex;gap:6px;margin-top:12px" onclick="event.stopPropagation()">'
            +'<button class="bs be" data-goal-edit="'+g.id+'" style="flex:1">Editar</button>'
            +'<button class="bs bdl" data-goal-del="'+g.id+'" style="flex:1">Excluir</button>'
          +'</div>'
        +'</div>';
      }).join('')
    +'</div>'

function calcFinanceScore(st, tgt) {
  st = st || {};
  tgt = Math.max(0, Number(tgt || 0));

  var sal = Math.max(0, Number(st.sal || 0));
  var gasto = Math.max(0, Number(st.gastoReal || 0));
  var committed = Math.max(0, Number(st.committed || 0));
  var expTotal = Math.max(0, Number(st.expTotal || 0));
  var fixedTotal = Math.max(0, Number(st.invTotal || 0));
  var parcTotal = Math.max(0, Number(st.parcTotal || 0));

  var hasData = sal > 0 || gasto > 0 || committed > 0 || expTotal > 0 || fixedTotal > 0 || parcTotal > 0;
  if(!hasData) return 0;
  if(sal <= 0) return Math.min(25, gasto > 0 ? 10 : 0);

  var surplus = sal - gasto;
  var savingRate = surplus / sal;
  var committedRate = committed / sal;
  var fixedRate = (fixedTotal + parcTotal) / sal;

  var cats = st.cats || {};
  var spentWithPlan = 0;
  var overspent = 0;
  var unplanned = 0;
  Object.keys(cats).forEach(function(k){
    var c = cats[k] || {};
    var spent = Math.max(0, Number(c.s || 0));
    var planned = Math.max(0, Number(c.p || 0));
    if(spent > 0 && planned > 0){
      spentWithPlan += spent;
      if(spent > planned) overspent += spent - planned;
    } else if(spent > 0 && planned <= 0){
      unplanned += spent;
    }
  });

  // 30 pts: sobra real do mês. Dá peso alto ao caixa que realmente ficou disponível.
  var savingScore = savingRate >= 0.20 ? 30
    : savingRate >= 0 ? Math.round((savingRate / 0.20) * 30)
    : Math.max(0, Math.round(30 + savingRate * 60));

  // 20 pts: comprometimento do orçamento. Penaliza quando o mês já nasce apertado.
  var budgetScore = committedRate <= 0.70 ? 20
    : committedRate <= 1 ? Math.round(20 * (1 - ((committedRate - 0.70) / 0.30)))
    : Math.max(0, Math.round(20 * (1 - Math.min(1, committedRate - 1))));

  // 20 pts: aderência ao planejado por categoria. Estouro e gasto sem teto reduzem a nota.
  var disciplineScore = 20;
  if(spentWithPlan > 0 || unplanned > 0){
    var base = Math.max(1, spentWithPlan + unplanned);
    var pressure = (overspent + unplanned * 0.55) / base;
    disciplineScore = Math.max(0, Math.round(20 * (1 - Math.min(1, pressure))));
  }

  // 15 pts: folga estrutural. Fixos + parcelas altos deixam a vida financeira frágil.
  var fixedScore = fixedRate <= 0.50 ? 15
    : fixedRate <= 0.80 ? Math.round(15 * (1 - ((fixedRate - 0.50) / 0.30)))
    : 0;

  // 10 pts: meta de poupança. Não pune quem ainda não definiu meta, mas recompensa quem cumpre.
  var targetScore = 5;
  if(tgt > 0) targetScore = surplus >= tgt ? 10 : Math.max(0, Math.round((surplus / tgt) * 10));
  else if(savingRate >= 0.10) targetScore = 8;
  else if(savingRate >= 0) targetScore = 5;
  else targetScore = 0;

  // 5 pts: qualidade mínima dos dados. Score fica mais confiável quando há renda e gastos registrados.
  var dataScore = (sal > 0 && gasto > 0) ? 5 : (sal > 0 ? 2 : 0);

  var total = Math.max(0, Math.min(100, Math.round(savingScore + budgetScore + disciplineScore + fixedScore + targetScore + dataScore)));

  // Travamentos de coerência: situações críticas não devem receber nota alta só por outro critério estar bom.
  if(gasto === 0 && sal > 0) total = Math.min(total, 55);
  if(surplus < 0) total = Math.min(total, Math.max(10, Math.round(45 + savingRate * 100)));
  if(committedRate > 1) total = Math.min(total, Math.max(15, Math.round(65 - (committedRate - 1) * 120)));

  return Math.max(0, Math.min(100, total));
}

function scoreLabel(s) {
  if(s >= 85) return {label:'Excelente', color:'#22c55e'};
  if(s >= 70) return {label:'Bom',       color:'#84cc16'};
  if(s >= 50) return {label:'Regular',   color:'#f59e0b'};
  if(s >= 30) return {label:'Atenção',   color:'#f97316'};
  return              {label:'Crítico',  color:'#ef4444'};
}

function buildInsights(stCur, stPrev, m) {
  var insights = [];
  var prevM = stPrev || {};
  var sal = Number(stCur.sal || 0);
  var gasto = Number(stCur.gastoReal || 0);
  var committed = Number(stCur.committed || 0);
  var sobra = sal - gasto;

  if(sal <= 0 && gasto <= 0 && committed <= 0){
    return [{ico:'🧭', txt:'Comece registrando sua receita e seus primeiros gastos para gerar uma nota financeira real.', good:false}];
  }

  if(sal <= 0 && gasto > 0){
    insights.push({ico:'⚠️', txt:'Há gastos registrados, mas nenhuma receita configurada. Cadastre a renda para a análise ficar correta.', good:false});
  }

  // 1. Fluxo de caixa real
  if(sal > 0) {
    var rate = Math.round((sobra / sal) * 100);
    if(rate >= 20)
      insights.push({ico:'🎉', txt:'Taxa de sobra de '+rate+'% — margem forte para poupar, investir ou antecipar metas.', good:true});
    else if(rate >= 10)
      insights.push({ico:'✅', txt:'Taxa de sobra de '+rate+'%. Boa margem, mas ainda há espaço para fortalecer a reserva.', good:true});
    else if(rate >= 0)
      insights.push({ico:'📉', txt:'Taxa de sobra de '+rate+'%. O mês fechou positivo, porém com pouca folga.', good:false});
    else
      insights.push({ico:'⚠️', txt:'O gasto real ultrapassou a receita em '+R(Math.abs(sobra))+'. Priorize cortar excessos ou revisar fixos.', good:false});
  }

  // 2. Gasto vs mês anterior
  if(prevM.gastoReal > 0 && gasto > 0) {
    var diff = Math.round(((gasto - prevM.gastoReal) / prevM.gastoReal) * 100);
    if(diff > 10)
      insights.push({ico:'📈', txt:'Gastos subiram '+diff+'% vs mês anterior ('+R(gasto-prevM.gastoReal)+' a mais).', good:false});
    else if(diff < -5)
      insights.push({ico:'📉', txt:'Gastos caíram '+Math.abs(diff)+'% vs mês anterior. Bom sinal de controle.', good:true});
  }

  // 3. Maior categoria
  var catArr = Object.keys(stCur.cats || {})
    .map(function(k){return{id:k,v:stCur.cats[k].s,p:stCur.cats[k].p};})
    .filter(function(x){return x.v>0;})
    .sort(function(a,b){return b.v-a.v;});
  if(catArr.length && gasto > 0) {
    var top = catArr[0];
    var topG = gBy(top.id);
    var topPct = Math.round((top.v / gasto)*100);
    insights.push({ico:'🔍', txt:topG.label+' foi sua maior categoria: '+R(top.v)+' ('+topPct+'% dos gastos).', good:topPct < 35});
  }

  // 4. Comprometimento da renda
  if(sal > 0) {
    var comPct = Math.round((committed / sal)*100);
    if(comPct > 100)
      insights.push({ico:'🔴', txt:'O orçamento comprometido passa da renda ('+comPct+'%). O mês já começa deficitário.', good:false});
    else if(comPct > 90)
      insights.push({ico:'🟠', txt:''+comPct+'% da renda está comprometida. Há pouco espaço para imprevistos.', good:false});
    else if(comPct < 70)
      insights.push({ico:'✅', txt:'Apenas '+comPct+'% da renda comprometida — margem saudável para imprevistos.', good:true});
  }

  // 5. Gastos variáveis vs total
  if(stCur.expTotal > 0 && gasto > 0) {
    var varPct2 = Math.round((stCur.expTotal / gasto)*100);
    if(varPct2 > 50)
      insights.push({ico:'🛒', txt:''+varPct2+'% dos gastos são avulsos/variáveis. Vale observar compras pequenas recorrentes.', good:false});
  }

  return insights.slice(0, 4);
}

function rStats() {
  var m = U.month;
  var stCur = stats(m);

  // Build monthly history (last 6 months)
  var candidateMs = [];
  for(var i=11; i>=0; i--) candidateMs.push(shM(m, -i));
  var activeMs = candidateMs.filter(function(mo){ return getExp(mo).length > 0 || mo === m; });
  if(activeMs.indexOf(m) === -1) activeMs.push(m);
  activeMs = activeMs.slice(-6);

  var totalSav = 0; var activeCnt = 0;
  var chartData = activeMs.map(function(mo) {
    var s = (mo === m) ? stCur : stats(mo);
    var hasData = getExp(mo).length > 0;
    if(hasData){ totalSav += s.realSav; activeCnt++; }
    return { m: mo, sal: s.sal, c: s.committed, sav: s.realSav, hasData: hasData };
  });
  var avgSav = activeCnt > 0 ? totalSav / activeCnt : 0;

  // Comparison vs previous month
  var prevM = shM(m, -1);
  var stPrev = stats(prevM);
  var varPct = stPrev.gastoReal > 0 ? Math.round(((stCur.gastoReal - stPrev.gastoReal) / stPrev.gastoReal) * 100) : null;

  // ── Score de saúde financeira ──────────────────────────────
  var score = calcFinanceScore(stCur, D.config.targetSavings);
  var sl = scoreLabel(score);
  var insights = buildInsights(stCur, stPrev, m);

  // Gauge SVG
  var gaugeR = 44, gaugeCx = 52, gaugeCy = 52;
  var circ = 2 * Math.PI * gaugeR;
  var fill = (score / 100) * circ;
  var gaugeSVG = '<svg width="104" height="104" viewBox="0 0 104 104" style="flex-shrink:0">'
    + '<circle cx="'+gaugeCx+'" cy="'+gaugeCy+'" r="'+gaugeR+'" fill="none" stroke="var(--bd)" stroke-width="10"/>'
    + '<circle cx="'+gaugeCx+'" cy="'+gaugeCy+'" r="'+gaugeR+'" fill="none" stroke="'+sl.color+'" stroke-width="10"'
    + ' stroke-dasharray="'+fill.toFixed(1)+' '+(circ-fill).toFixed(1)+'"'
    + ' stroke-dashoffset="'+(circ/4).toFixed(1)+'"'
    + ' transform="rotate(-90 '+gaugeCx+' '+gaugeCy+')" stroke-linecap="round"/>'
    + '<text x="'+gaugeCx+'" y="'+(gaugeCy-4)+'" text-anchor="middle" font-size="20" font-weight="900" fill="'+sl.color+'" font-family="DM Mono,monospace">'+score+'</text>'
    + '<text x="'+gaugeCx+'" y="'+(gaugeCy+13)+'" text-anchor="middle" font-size="9" fill="var(--mt)" font-family="Plus Jakarta Sans,sans-serif">/ 100</text>'
  + '</svg>';

  var insightsHTML = insights.map(function(ins){
    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)">'
      +'<span style="font-size:16px;flex-shrink:0;line-height:1.4">'+ins.ico+'</span>'
      +'<span style="font-size:12px;color:var(--txt);line-height:1.5">'+ins.txt+'</span>'

  }).join('');

  // Armazena refs globalmente para uso no onclick do modal
  window._bmStCur=stCur; window._bmStPrev=stPrev; window._bmM=m; window._bmScore=score; window._bmSl=sl;

  // KPI cards
  var livre = stCur.sal - stCur.committed;
  var kpiHTML = '<div class="dash-cards" style="margin-bottom:24px">'
    + [
      {label:'Receita total',    value:R(stCur.sal),      color:'var(--grn)', sub:'salários + extras'},
      {label:'Gasto Real',       value:R(stCur.gastoReal),color:'var(--txt)', sub:'avulsos + fixos + parcelas'},
      {label:'Sobra do mês',     value:R(stCur.realSav),  color:stCur.realSav>=0?'var(--grn)':'var(--red)', sub:'meta: '+R(D.config.targetSavings)},
      {label:'Var. mês anterior',value:varPct!==null?(varPct>=0?'▲ +'+varPct+'%':'▼ '+varPct+'%'):'—',
       color:varPct===null?'var(--mt)':varPct>0?'var(--red)':'var(--grn)',
       sub:varPct!==null?(varPct>0?R(stCur.gastoReal-stPrev.gastoReal)+' a mais':R(stPrev.gastoReal-stCur.gastoReal)+' a menos'):'sem histórico'},
    ].map(function(k){
      return '<div class="sc" style="border-top:3px solid '+k.color+'">'
        +'<div class="sl">'+k.label+'</div>'
        +'<div class="sv" style="color:'+k.color+';font-size:17px">'+k.value+'</div>'
        +'<div class="ss">'+k.sub+'</div>'
      +'</div>';
    }).join('')
  +'</div>';

  // SVG Area Chart
  var W=520, H=160, padL=36, padR=16, padT=16, padB=28;

  var n=chartData.length;
  var allV=[]; chartData.forEach(function(d){ allV.push(d.sal,d.c); });
  var vMin=allV.length?Math.max(0,Math.min.apply(null,allV)*0.9-500):0;
  var vMax=allV.length?Math.max.apply(null,allV)*1.08:15000;

  function smPath(pts){return pts.map(function(p,i){if(i===0)return'M'+p.x.toFixed(1)+' '+p.y.toFixed(1);var pv=pts[i-1];var cx=(pv.x+p.x)/2;return'C'+cx.toFixed(1)+' '+pv.y.toFixed(1)+' '+cx.toFixed(1)+' '+p.y.toFixed(1)+' '+p.x.toFixed(1)+' '+p.y.toFixed(1);}).join(' ');}
  var sPts=chartData.map(function(d,i){return{x:xOf(i),y:yOf(d.sal)};});
  var cPts=chartData.map(function(d,i){return{x:xOf(i),y:yOf(d.c)};});
  var sPath=smPath(sPts); var cPath=smPath(cPts);
  var bot=padT+cH;
  var sArea=sPath+' L'+xOf(n-1).toFixed(1)+' '+bot+' L'+padL+' '+bot+' Z';
  var cArea=cPath+' L'+xOf(n-1).toFixed(1)+' '+bot+' L'+padL+' '+bot+' Z';
  var gridL=[vMin,(vMin+vMax)/2,vMax].map(function(v){var y=yOf(v).toFixed(1);var lbl=v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(0);return'<line x1="'+padL+'" x2="'+(padL+cW)+'" y1="'+y+'" y2="'+y+'" stroke="#e8ecf2" stroke-width="1"/><text x="'+(padL-4)+'" y="'+(parseFloat(y)+4)+'" font-size="9" fill="#94a3b8" text-anchor="end" font-family="DM Mono,monospace">'+lbl+'</text>';}).join('');
  var xLbl=chartData.map(function(d,i){var lbl=new Date(d.m+'-15').toLocaleDateString('pt-BR',{month:'short'}).replace('.','').toUpperCase();var cur=d.m===m;return'<text x="'+xOf(i).toFixed(1)+'" y="'+(padT+cH+18)+'" font-size="10" fill="'+(cur?'#0d1117':'#94a3b8')+'" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-weight="'+(cur?'700':'400')+'">'+lbl+(cur?'*':'')+'</text>';}).join('');
  var curLbl=''; if(n>0){var ci=chartData.length-1;curLbl='<text x="'+xOf(ci).toFixed(1)+'" y="'+(yOf(chartData[ci].c)-10)+'" font-size="10" fill="#ef4444" text-anchor="middle" font-family="DM Mono,monospace">'+R(chartData[ci].c)+'</text>';}
  var svgChart='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;overflow:visible"><defs><linearGradient id="sgr1" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0"/></linearGradient><linearGradient id="sgr2" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/></linearGradient></defs>'+gridL+'<path d="'+sArea+'" fill="url(#sgr1)"/><path d="'+cArea+'" fill="url(#sgr2)"/><path d="'+sPath+'" fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/><path d="'+cPath+'" fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>'+sPts.map(function(p,i){var cur=chartData[i].m===m;return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(cur?4:2.5)+'" fill="'+(cur?'#22c55e':'#fff')+'" stroke="#22c55e" stroke-width="2"/>';}).join('')+cPts.map(function(p,i){var cur=chartData[i].m===m;return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(cur?4:2.5)+'" fill="'+(cur?'#ef4444':'#fff')+'" stroke="#ef4444" stroke-width="2"/>';}).join('')+xLbl+curLbl+'</svg>';

  // ── Gráfico de linha: Gastos por dia do mês ──────────────────────────────
  var yr2=parseInt(m.split('-')[0],10), mo2=parseInt(m.split('-')[1],10);
  var daysInMon=new Date(yr2,mo2,0).getDate();

  var maxDayVal=topDayAmt||1;

  // Coordenadas do gráfico de linha
  var LW=560,LH=120,lPL=44,lPR=12,lPT=10,lPB=22;
  var lCW=LW-lPL-lPR, lCH=LH-lPT-lPB;
  var xOfDay=function(d){return lPL+((d-1)/(Math.max(daysInMon,2)-1))*lCW;};
  var yOfAmt=function(v){return lPT+lCH-(v/(maxDayVal*1.12))*lCH;};

  // Pontos: todos os dias até hoje
  var lPts=[];
  for(var dp=1;dp<=todayDay;dp++) lPts.push({x:xOfDay(dp),y:yOfAmt(dayAmts[dp]||0),d:dp,v:dayAmts[dp]||0});

  var lBot=lPT+lCH;

  // Grade Y

  }).join('');

  var lChartSVG='<svg width="100%" viewBox="0 0 '+LW+' '+LH+'" style="display:block;overflow:visible">'

        +(topDayDate2?'<div style="text-align:right;font-size:11px;color:var(--mt);flex-shrink:0;margin-left:12px">Pico do mês<br><span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--red)">'+topDayDate2+'&nbsp;'+R(topDayAmt)+'</span></div>':'')

function rBalanco(m, st, score, sl, insights) {
  // Defaults para quando chamado sem score (retrocompatibilidade)
  score = Number.isFinite(Number(score)) ? Math.max(0, Math.min(100, Math.round(Number(score)))) : 0;
  sl = sl || scoreLabel(score);
  insights = insights || [];
  var gaugeR=34, gaugeCx=40, gaugeCy=40;
  var gCirc=2*Math.PI*gaugeR, gFill=(score/100)*gCirc;
  var gaugeSVG='<svg width="80" height="80" viewBox="0 0 80 80" style="flex-shrink:0">'
    +'<circle cx="'+gaugeCx+'" cy="'+gaugeCy+'" r="'+gaugeR+'" fill="none" stroke="var(--bd)" stroke-width="8"/>'
    +'<circle cx="'+gaugeCx+'" cy="'+gaugeCy+'" r="'+gaugeR+'" fill="none" stroke="'+sl.color+'" stroke-width="8"'
    +' stroke-dasharray="'+gFill.toFixed(1)+' '+(gCirc-gFill).toFixed(1)+'"'
    +' stroke-dashoffset="'+(gCirc/4).toFixed(1)+'" transform="rotate(-90 '+gaugeCx+' '+gaugeCy+')" stroke-linecap="round"/>'
    +'<text x="'+gaugeCx+'" y="'+(gaugeCy-3)+'" text-anchor="middle" font-size="16" font-weight="900" fill="'+sl.color+'" font-family="DM Mono,monospace">'+score+'</text>'
    +'<text x="'+gaugeCx+'" y="'+(gaugeCy+11)+'" text-anchor="middle" font-size="8" fill="var(--mt)" font-family="Plus Jakarta Sans,sans-serif">/100</text>'
  +'</svg>';
  var insightsHTML = insights.length
    ? insights.map(function(ins){
        return '<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd)">'
          +'<span style="font-size:14px;flex-shrink:0">'+ins.ico+'</span>'
          +'<span style="font-size:12px;color:var(--txt);line-height:1.45">'+ins.txt+'</span>'
        +'</div>';
      }).join('')
    : '';
  var sal = Math.max(0, Number(st.sal || 0));
  var gasto = Math.max(0, Number(st.gastoReal || 0));
  var sobra = sal - gasto;
  var taxaPoupanca = sal > 0 ? ((sobra / sal) * 100).toFixed(1) : 0;
  var taxaGasto = sal > 0 ? ((gasto / sal) * 100).toFixed(1) : 0;

  // Alertas automáticos
  var alertas = [];
  GR.forEach(function(g){
    var c = st.cats[g.id];
    if(!c) return;
    if(c.p > 0 && c.s > c.p) alertas.push({type:'over', msg:'<b>'+g.label+'</b>: gastou '+R(c.s)+' de '+R(c.p)+' previsto (+'+(((c.s-c.p)/c.p)*100).toFixed(0)+'%)', color:'var(--red)'});
    else if(c.p > 0 && c.s > c.p * 0.85) alertas.push({type:'warn', msg:'<b>'+g.label+'</b>: '+R(c.s)+' de '+R(c.p)+' ('+((c.s/c.p)*100).toFixed(0)+'% do limite)', color:'var(--amb)'});
  });
  if(sal > 0 && parseFloat(taxaPoupanca) < 10) alertas.push({type:'warn', msg:'Taxa de poupança abaixo de 10% do salário.', color:'var(--amb)'});
  if(sal > 0 && gasto > sal) alertas.push({type:'over', msg:'Gasto real ultrapassou a receita mensal em '+R(gasto-sal)+'.', color:'var(--red)'});

  var alertHTML = alertas.length

        +'<div style="font-size:12px;color:var(--mt);margin-top:3px">Poupança: <b>'+taxaPoupanca+'%</b> · Comprometimento: <b>'+taxaGasto+'%</b></div>'
      +'</div>'

    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'

// Detecta se o app está rodando em modo instalado (standalone/PWA)
function _isAppInstalled(){
  return !!(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
         !!(window.navigator && window.navigator.standalone === true);
}
var PLAY_STORE_BUILD = true;
var _INSTALL_DONE_KEY = '_poupai_install_done';
function _installDismissed(){ try{ return localStorage.getItem(_INSTALL_DONE_KEY)==='1'; }catch(e){ return false; } }
function _markInstallDone(){ try{ localStorage.setItem(_INSTALL_DONE_KEY,'1'); }catch(e){} }
function _shouldShowInstallNotif(){
  return !PLAY_STORE_BUILD && !_isAppInstalled() && !_installDismissed();
}

            +'<button onclick="window._notifSetOs(\'ios\')" id="notif-btn-ios" style="flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:'+(os==='ios'?'var(--grn)':'var(--s2)')+';color:'+(os==='ios'?'#fff':'var(--mt)')+';border:1px solid '+(os==='ios'?'var(--grn)':'var(--bd)')+'">🍎 iPhone</button>'
          +'</div>'

        +'</div>';

window.openPrevCatModal = function(gid){
  var m = U.month;
  var g = gBy(gid);
  var items = getPlanned(m);
  var gi = items.filter(function(i){ return !i.isParcela && i.group === gid; });
  var ginst = items.filter(function(i){ return i.isParcela && i.group === gid; });
  var all = gi.concat(ginst);
  var gtot = all.reduce(function(s,i){ return s+i.amount; }, 0);
  var isBulk = !!U.bulkMode;

  function buildRows(){
    if(!all.length) return '<div style="font-size:13px;color:var(--mt2);padding:16px 0">Nenhum item nesta categoria.</div>';
    return all.map(function(item){
      var orig = D.fixedItems.find(function(f){return f.id===item.id;}) || item;
      var due = orig.dueDay ? dueBadge(orig.dueDay, m) : '';
      var noteTxt = orig.notes ? '<div style="font-size:11px;color:var(--mt2);margin-top:2px">'+safeTxt(orig.notes)+'</div>' : '';
      var typTag = !isEst(orig) ? '<span class="pitag" style="background:var(--grn-l);color:var(--grn-d)">fixo</span>' : '';
      var instTag = item.isParcela ? '<span class="pitag" style="background:var(--pur-l);color:var(--pur)">parcela</span>' : '';
      if(isBulk && !item.isParcela){
        // Modo bulk: mostra checkbox em vez de link de edição
        var isChecked = !!(U.bulkSel && U.bulkSel[item.id]);
        return '<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--bd);cursor:pointer" onclick="window._prevBulkToggle(\''+item.id+'\')">'
          +'<input type="checkbox" id="bulk-chk-'+item.id+'" '+(isChecked?'checked':'')+' onclick="event.stopPropagation();window._prevBulkToggle(\''+item.id+'\')" style="width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--blu)">'
          +'<div style="min-width:0;flex:1">'
            +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px;font-size:14px;font-weight:600;color:var(--txt)">'+safeTxt(item.label)+typTag+instTag+due+'</div>'
            +noteTxt
          +'</div>'
          +'<span style="font-family:\'DM Mono\',monospace;font-size:14px;font-weight:700;color:'+g.color+';flex-shrink:0">'+R(item.amount)+'</span>'
        +'</div>';
      }
      var editFn = item.isParcela ? 'window.openInstEdit' : 'window.openPlanEdit';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid var(--bd)">'
        +'<div style="min-width:0;flex:1">'
          +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px;font-size:14px;font-weight:600;color:var(--txt)">'+safeTxt(item.label)+typTag+instTag+due+'</div>'
          +noteTxt
        +'</div>'
        +'<span onclick="window.closePrevCatModal();'+editFn+'(\''+item.id+'\')" style="font-family:\'DM Mono\',monospace;font-size:14px;font-weight:700;color:'+g.color+';cursor:pointer;margin-left:14px;flex-shrink:0;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color 0.15s" onmouseover="this.style.textDecorationColor=\''+g.color+'\'" onmouseout="this.style.textDecorationColor=\'transparent\'">'+R(item.amount)+'</span>'
      +'</div>';
    }).join('');
  }

  // Barra de ações para o modo bulk, exibida dentro do modal
  function buildBulkBar(){
    if(!isBulk) return '';
    var selCount = Object.keys(U.bulkSel||{}).filter(function(k){ return U.bulkSel[k]; }).length;
    return '<div id="prev-modal-bulk-bar" style="background:var(--blu-l);border:1px solid #bfdbfe;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
      +'<span id="prev-modal-bulk-count" style="font-size:13px;font-weight:600;color:var(--blu-d);flex:1">'+selCount+' selecionado(s)</span>'
      +'<button class="bs be" onclick="window._prevBulkApply(false)">Marcar como Invariável</button>'
      +'<button class="bs" style="background:var(--blu-l);color:var(--blu-d)" onclick="window._prevBulkApply(true)">Marcar como Estimativa</button>'
      +'<button class="bs bdl" onclick="window._prevBulkDeleteSelected()">🗑 Apagar selecionadas</button>'
    +'</div>';
  }

  function buildModal(){
    return '<div class="cat-overlay" id="prev-cat-overlay" onclick="if(event.target===this)window.closePrevCatModal()">'
      +'<div class="cat-modal">'
        +'<div class="cat-modal-hdr">'
          +'<div style="display:flex;align-items:center;gap:12px">'+ibadge(g,40)
            +'<div><div style="font-size:18px;font-weight:700;letter-spacing:-0.02em">'+safeTxt(g.label)+'</div>'
            +'<div style="font-size:12px;color:var(--mt);margin-top:2px">'+all.length+' item'+(all.length!==1?'s':'')+(isBulk?' · modo seleção':'')+'</div></div>'
          +'</div>'
          +'<button class="cat-modal-close" onclick="window.closePrevCatModal()">&#10005;</button>'
        +'</div>'
        +'<div class="cat-modal-body">'
          +(isBulk
            ? buildBulkBar()
            : '<div style="font-family:\'DM Mono\',monospace;font-size:22px;font-weight:800;color:'+g.color+';margin-bottom:3px">'+R(gtot)+'</div>'
             +'<div style="font-size:11px;color:var(--mt);margin-bottom:16px">previsto neste mês · toque no valor para editar</div>')
          +buildRows()
          +(!isBulk ? '<button class="bgrn" style="margin-top:18px;width:100%" onclick="window.closePrevCatModal();window.openAddPlan(\''+gid+'\')">+ Adicionar item em '+safeTxt(g.label)+'</button>' : '')
        +'</div>'
      +'</div>'
    +'</div>';
  }

  var el = document.createElement('div');
  el.innerHTML = buildModal();
  document.body.appendChild(el.firstChild);

  // Helpers do bulk mode dentro do modal
  window._prevBulkToggle = function(id){
    if(!U.bulkSel) U.bulkSel = {};
    U.bulkSel[id] = !U.bulkSel[id];
    // Atualiza checkbox diretamente sem re-renderizar o modal inteiro
    var chk = document.getElementById('bulk-chk-'+id);
    if(chk) chk.checked = !!U.bulkSel[id];
    var countEl = document.getElementById('prev-modal-bulk-count');
    var sel = Object.keys(U.bulkSel).filter(function(k){ return U.bulkSel[k]; });
    if(countEl) countEl.textContent = sel.length+' selecionado(s)';
    // Atualiza o contador do bulk-bar externo se visível
    var extCount = document.getElementById('bulk-count');
    if(extCount) extCount.textContent = sel.length+' selecionado(s)';
  };

  window._prevBulkApply = function(estVal){
    var ids = Object.keys(U.bulkSel||{}).filter(function(k){ return U.bulkSel[k]; });
    if(!ids.length){ alert('Selecione pelo menos um item.'); return; }
    D.fixedItems = D.fixedItems.map(function(i){
      return ids.indexOf(i.id) >= 0 ? Object.assign({},i,{isEstimate:estVal}) : i;
    });
    U.bulkSel = {}; U.bulkMode = false;
    sset(D);
    window.closePrevCatModal();
    render();
  };

  window._prevBulkDeleteSelected = function(){
    var ids = Object.keys(U.bulkSel||{}).filter(function(k){ return U.bulkSel[k]; });
    if(!ids.length){ alert('Selecione pelo menos um item para excluir.'); return; }
    if(!confirm('Excluir '+ids.length+' item(s) selecionado(s)? Esta ação não pode ser desfeita.')) return;
    D.fixedItems = D.fixedItems.filter(function(i){ return ids.indexOf(i.id) === -1; });
    U.bulkSel = {}; U.bulkMode = false;
    sset(D);
    window.closePrevCatModal();
    render();
  };
};

  var exps = getExp(m).slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  var activeInst = getActiveInstAll(m);

  var savRate = st.sal > 0 ? ((st.sal - st.gastoReal) / st.sal * 100).toFixed(1) : '0.0';

  // Tabela de categorias
  var catRows = GR.filter(function(g){ return st.cats[g.id] && (st.cats[g.id].p > 0 || st.cats[g.id].s > 0); })
    .sort(function(a,b){ return (st.cats[b.id].s||0) - (st.cats[a.id].s||0); })
    .map(function(g){
      var c = st.cats[g.id];
      var prev = c.p || 0; var gasto = c.s || 0; var diff = gasto - prev;
      var dc = diff > 0 ? '#dc2626' : diff < 0 ? '#16a34a' : '#94a3b8';
      var ds = diff > 0 ? '+'+R(diff) : diff < 0 ? R(diff) : '–';
      return '<tr><td style="padding:8px 10px;border-bottom:1px solid #f1f5f9">'+safeTxt(g.label)+'</td>'

          var g = gBy(gid);
          return '<span class="cal-ico" style="background:'+g.color+'22;color:'+g.color+'" title="'+safeAttr(g.label)+'">' + (ICO[g.id]||ICO.outros) + '</span>';
        }).join('') + '</div>';
      }
      html += '<td onclick="window.filterByDate(\''+dStr+'\')"><span class="'+dayClass+'">'+dayCount+'</span>'+iconsHtml+'</td>';
      dayCount++;
    }
    if (dayCount > daysInMonth && i % 7 === 6) break; 
  }
  html += '</tbody></table></div></div>';
  return html;
}

function rGastosMes(){
  var m = U.month;
  var st = stats(m);
  var planned = getPlanned(m);
  var exps = getExp(m);

  var totalGeral = 0;
  var blocos = GR.map(function(g){
    var plannedItems = planned.filter(function(i){ return i.group === g.id; });
    var expItems     = exps.filter(function(e){ return e.group === g.id; });
    var cat          = st.cats[g.id];
    var committed    = cat ? cat.c : 0;
    if(!committed && !plannedItems.length && !expItems.length) return '';
    totalGeral += committed;

    var sumExp    = cat ? cat.s : 0;
    var sumPlanned= cat ? cat.p : 0;
    var overBudget= sumExp > sumPlanned && sumPlanned > 0;

    var rows = '';

    if(expItems.length){
      if(plannedItems.length)
        rows += '<div style="font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 3px">Realizado</div>';
      expItems.forEach(function(e){
        var dl = new Date(e.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        rows += '<div class="pi"><div class="pin">'+(safeTxt(e.description)||g.label)
          +'<span class="pitag" style="background:'+g.color+'18;color:'+g.color+'">'+dl+'</span></div>'
          +'<span style="font-family:monospace;font-size:13px;font-weight:700;color:'+g.color+'">'+R(e.amount)+'</span></div>';
      });
    }

    if(plannedItems.length){
      if(expItems.length)
        rows += '<div style="font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 3px;margin-top:4px;border-top:1px solid var(--bd)">Previsto/Fixo</div>';
      plannedItems.forEach(function(i){
        var typeTag = !isEst(i)
          ? '<span class="pitag" style="background:#f0fdf4;color:var(--grn)">invariável</span>'
          : i.isParcela
            ? '<span class="pitag" style="background:var(--pur-l);color:var(--pur)">parcela</span>'
            : i.isExtra
              ? '<span class="pitag" style="background:var(--amb-l);color:var(--amb)">extra</span>'
              : '<span class="pitag" style="background:var(--s2);color:var(--mt)">estimativa</span>';
        rows += '<div class="pi"><div class="pin">'+safeTxt(i.label)+typeTag+'</div>'
          +'<span style="font-family:monospace;font-size:13px;font-weight:600;color:'+(overBudget?'var(--mt2)':'var(--mt)')+'">'+R(i.amount)+'</span></div>';
      });
      if(overBudget)
        rows += '<div style="font-size:11px;color:var(--amb);padding:4px 0">Realizado supera o planejado</div>';
    }

    var headerRight = sumExp > 0 && sumExp !== committed
      ? '<div style="text-align:right"><div style="font-family:monospace;font-size:13px;font-weight:700;color:'+(overBudget?'var(--red)':g.color)+'">'+R(sumExp)+'</div><div style="font-family:monospace;font-size:11px;color:var(--mt2)">teto: '+R(committed)+'</div></div>'
      : '<div style="text-align:right"><div style="font-family:monospace;font-size:13px;font-weight:700;color:'+(overBudget?'var(--amb)':g.color)+'">'+R(committed)+'</div></div>';
    return '<div class="card" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)">'
        +'<div style="display:flex;align-items:center;gap:8px">'+ibadge(g,26)
          +'<span style="font-size:14px;font-weight:700">'+safeTxt(g.label)+'</span></div>'
        +headerRight
      +'</div>'+rows+'</div>';
  }).join('');

  if(!blocos.replace(/\s/g,''))
    blocos = '<div class="empty">Nenhum dado para este mês.</div>';

  return '<div class="fs"><div class="fhdr"><button class="fbk" onclick="window.backOrClose()">&#8592; Voltar</button>'
    +'<div><div class="ftit">Gastos completos</div><div class="fsub">'+mLbl(m)+'</div></div></div>'
    +'<div class="notice">Teto = invariáveis + maior entre estimativa e real por categoria. Invariáveis entram direto; estimativas usam o valor real se já foi superado.</div>'
    +blocos
    +'<div class="card" style="display:flex;flex-direction:column;gap:6px;padding:14px 16px">'
      +'<div style="display:flex;justify-content:space-between"><span style="font-size:14px;color:var(--mt)">Gasto real</span><span style="font-family:monospace;font-size:14px;font-weight:700;color:var(--txt)">'+R(st.gastoReal)+'</span></div>'
      +'<div style="display:flex;justify-content:space-between"><span style="font-size:14px;font-weight:700">Teto comprometido</span><span style="font-family:monospace;font-size:15px;font-weight:700;color:var(--amb)">'+R(totalGeral)+'</span></div>'
    +'</div>'
    +'</div>';
}

window.handleImportFile = async function(source) {
  var file = source.files ? source.files[0] : (source.dataTransfer ? source.dataTransfer.files[0] : null);
  if(!file) return;
  var lbl = document.getElementById('imp-file-lbl');
  if(file.size > IMPORT_MAX_BYTES){
    if(lbl) lbl.textContent = '❌ Arquivo muito grande. Use até 5 MB ou divida a planilha em partes menores.';
    return;
  }
  if(lbl) lbl.textContent = '⏳ Processando: ' + file.name + '...';

  var ext = file.name.split('.').pop().toLowerCase();

  var processText = function(text) {
    text = String(text || '');
    if(text.length > IMPORT_MAX_TEXT_CHARS){
      if(lbl) lbl.textContent = '❌ O conteúdo do arquivo ficou grande demais. Importe até 5.000 linhas por vez.';
      return;
    }
    var ta = document.getElementById('tsv-input');
    if(ta) ta.value = text;
    if(lbl) lbl.textContent = '✅ ' + file.name + ' carregado. Clique em Analisar.';
  };

  if(ext === 'csv' || ext === 'txt') {
    var reader = new FileReader();
    reader.onload = function(e) { processText(e.target.result); };
    // Try UTF-8 first, fall back to latin1 for Brazilian files
    reader.onerror = function() {
      var r2 = new FileReader();
      r2.onload = function(e) { processText(e.target.result); };
      r2.readAsText(file, 'ISO-8859-1');
    };
    reader.readAsText(file, 'UTF-8');
  } else if(ext === 'xlsx' || ext === 'xls') {
    try {
      var XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
      var reader2 = new FileReader();
      reader2.onload = function(e) {
        try {

function parseAmount(str) {
  if(str === null || str === undefined) return 0;
  var raw = String(str).trim();
  if(!raw) return 0;
  var s = raw.replace(/R\$/gi,'').replace(/\s/g,'').replace(/[()]/g,'');
  if(!s) return 0;

    var n = parseFloat(s);
    return isNaN(n) ? 0 : Math.round(Math.abs(n) * 100) / 100;
  }
  if(/^-?\d{1,3}(\.\d{3})*(,\d{1,2})?$/.test(s)) {

  if(/^-?\d+\.\d{1,2}$/.test(s)) return Math.round(Math.abs(parseFloat(s)) * 100) / 100;

  else if(lastDot > lastComma) clean = clean.replace(/,/g,'');
  else clean = clean.replace(',','.');
  var n3 = parseFloat(clean);
  return isNaN(n3) ? 0 : Math.round(Math.abs(n3) * 100) / 100;
}

function monthDiff(a, b) {
  var ap=a.split('-').map(Number), bp=b.split('-').map(Number);
  return (bp[0]-ap[0])*12 + (bp[1]-ap[1]);
}
function instParcelInfo(inst, m) {
  var cur, tot;
  var match = inst.notes && inst.notes.match(/Parcelas\s+(\d+)\s+a\s+(\d+)\/(\d+)/);
  if(match){
    tot = parseInt(match[3]);
    cur = parseInt(match[1]) + monthDiff(inst.start, m);
  } else if(inst.start && inst.end){
    tot = monthDiff(inst.start, inst.end) + 1;
    cur = monthDiff(inst.start, m) + 1;
  } else if(inst.start){
    cur = monthDiff(inst.start, m) + 1; tot = null;
  }
  return {cur: cur, tot: tot};
}

  if(!active.length) return '';
  var tot = active.reduce(function(s,i){return s+i.amount;},0);
  var g = gBy('parcelas');
  var open = !!U.gastosParcOpen;
  var rows = open ? active.map(function(inst){
    var info = instParcelInfo(inst, m);
    var parcLabel = info.tot ? ('Parcela '+info.cur+'/'+info.tot) : ('Parcela '+info.cur);
    return '<div class="pi">'
      +'<div class="pin">'+safeTxt(inst.label)+'<br><span style="font-size:11px;color:var(--mt2);font-weight:400">'+parcLabel+'</span></div>'
      +'<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--pur)">'+R(inst.amount)+'</span>'
      +'</div>';
  }).join('') : '';
  return '<div style="background:var(--pur-l);border:1px solid #ddd6fe;border-radius:12px;padding:12px 14px;margin-top:12px">'
    +'<button onclick="window.toggleGastosParc()" style="width:100%;background:transparent;border:none;padding:0;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;text-align:left;font-family:inherit">'
      +'<div style="min-width:0;display:flex;align-items:center;gap:8px">'+ibadge(g,24)+'<div><div style="font-size:13px;font-weight:800;color:var(--pur)">Parcelas cartão</div><div style="font-size:11px;color:var(--mt);margin-top:2px">'+active.length+' parcela(s) ativa(s) neste mês</div></div></div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-shrink:0">'
        +'<span style="font-family:monospace;font-size:13px;font-weight:800;color:var(--pur)">'+R(tot)+'</span>'
        +'<span style="width:24px;height:24px;border-radius:999px;background:#fff;border:1px solid #ddd6fe;display:inline-flex;align-items:center;justify-content:center;color:var(--pur);font-size:13px;font-weight:800">'+(open?'−':'+')+'</span>'
      +'</div>'
    +'</button>'
    +(open?'<div style="margin-top:10px;padding-top:8px;border-top:1px solid #ddd6fe">'+rows+'</div>':'')
  +'</div>';
}

window.saveWithdrawal = function(invId){
  var amtEl = document.getElementById('wr-amount');
  var dateEl = document.getElementById('wr-date');
  var notesEl = document.getElementById('wr-notes');
  var amt = pn(amtEl ? amtEl.value : '0');
  if(!amt || amt <= 0){ alert('Informe o valor retirado.'); return; }
  var inv = (D.investments||[]).find(function(x){return x.id===invId;});
  if(!inv){ alert('Investimento não encontrado.'); return; }
  if(amt > inv.amount){ alert('O valor retirado ('+R(amt)+') é maior que o saldo atual ('+R(inv.amount)+').'); return; }

  var fromModal = !!document.getElementById('invest-withdrawal-overlay');
  if(!inv.withdrawals) inv.withdrawals = [];
  inv.withdrawals.push({
    id: 'wr_'+Date.now(),
    amount: amt,
    date: (dateEl && dateEl.value) || tod(),
    notes: (notesEl && notesEl.value.trim()) || ''
  });
  inv.amount = Math.max(0, inv.amount - amt);
  sset(D);

  if(fromModal){
    window._closeModal('invest-withdrawal-overlay');
    window._closeModal('invest-detail-modal');
    U.scr='main'; U.tab='invest';
    render();
    setTimeout(function(){ if(typeof window.openInvestDetail==='function') window.openInvestDetail(invId); }, 0);
    return;
  }

  U.investEd = invId;
  render();
  setTimeout(function(){
    var box = document.getElementById('inv-wr-box');
    if(box) box.style.display = 'none';
  }, 50);
};

  var section = document.getElementById('inv-rate-section');
  if(!section) return;
  var t = invType(newType);

window.saveInvest=function(){
  var name=(document.getElementById('inv-name').value||'').trim();
  var amount=pn(document.getElementById('inv-amount').value);
  var typeEl=document.getElementById('inv-type');
  var type=typeEl?typeEl.value:'outro';
  var liqEl=document.querySelector('input[name="inv-liq"]:checked');
  var liquidity=liqEl?liqEl.value:'diaria';
  var startDate=(document.getElementById('inv-start')&&document.getElementById('inv-start').value)||tod();
  var dueDate=(document.getElementById('inv-due')&&document.getElementById('inv-due').value)||'';
  var notes=(document.getElementById('inv-notes')&&document.getElementById('inv-notes').value||'').trim();
  var t=invType(type);

  if(!name){ alert('Digite um nome para o investimento.'); return; }
  if(!amount||amount<=0){ alert('Digite o valor atual investido.'); return; }

  var item={id:U.investEd||uid(), name:name, type:type, amount:amount, startDate:startDate, dueDate:dueDate, liquidity:liquidity, notes:notes, yieldMode:'manual', rate:0, ratePeriod:'year'};

  if(t.rateMode==='cdi'){
    var cp=pn((document.getElementById('inv-cdipct')&&document.getElementById('inv-cdipct').value)||'100');
    if(!cp||cp<=0){ alert('Informe o % do CDI (ex: 110).'); return; }
    item.cdiPct=cp; item.rate=cp;
  } else if(t.rateMode==='selic'||t.rateMode==='poup'){
    item.yieldMode='auto'; item.rate=0;
  } else if(t.rateMode==='ipca'){
    var sp=pn((document.getElementById('inv-spread')&&document.getElementById('inv-spread').value)||'0');
    item.spread=sp; item.rate=sp;
  } else if(t.rateMode==='manual'){
    var ymEl2=document.getElementById('inv-yield');
    var ym3=ymEl2?ymEl2.value:'none';
    item.yieldMode=ym3;
    if(ym3!=='none'){
      var r2=pn((document.getElementById('inv-rate')&&document.getElementById('inv-rate').value)||'0');
      if(!r2){ alert('Informe a taxa ou selecione "Sem estimativa".'); return; }
      item.rate=r2;
      var rp2=document.getElementById('inv-rate-period');
      item.ratePeriod=rp2?rp2.value:'year';
    }
  } else {
    var r3=pn((document.getElementById('inv-rate')&&document.getElementById('inv-rate').value)||'0');
    if(!r3||r3<=0){ alert('Informe a taxa de rendimento.'); return; }
    item.rate=r3;
    var rp3=document.getElementById('inv-rate-period');
    item.ratePeriod=rp3?rp3.value:'year';
  }

  D.investments=Array.isArray(D.investments)?D.investments:[];
  var idx=D.investments.findIndex(function(x){return x.id===item.id;});
  if(idx>=0) D.investments[idx]=item; else D.investments.push(item);
  U.investEd=null; U.investDel=null; U.scr='main'; U.tab='invest';
  sset(D); render();
};
